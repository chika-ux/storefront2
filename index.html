<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TechDrop ⚡ Electronics</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #05070f;
    --surface: rgba(255,255,255,0.04);
    --surface-hover: rgba(255,255,255,0.08);
    --border: rgba(255,255,255,0.08);
    --border-glow: rgba(120,80,255,0.4);
    --accent: #7850ff;
    --accent2: #ff3cac;
    --accent3: #00e5ff;
    --text: #f0f0ff;
    --muted: rgba(240,240,255,0.45);
    --card-bg: rgba(12,14,28,0.7);
    --glow: 0 0 40px rgba(120,80,255,0.15);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── AMBIENT BACKGROUND ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(120,80,255,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 50% 35% at 80% 80%, rgba(0,229,255,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 60% 30%, rgba(255,60,172,0.08) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── GRID OVERLAY ── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(120,80,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(120,80,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── NAVBAR ── */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    height: 60px;
    background: rgba(5,7,15,0.8);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #fff 0%, var(--accent) 60%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .logo span { -webkit-text-fill-color: var(--accent2); }

  .cart-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 50px;
    color: #fff;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(120,80,255,0.4);
    position: relative;
  }

  .cart-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(120,80,255,0.5); }

  .cart-count {
    background: #fff;
    color: var(--accent);
    border-radius: 50%;
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
  }

  /* ── HERO ── */
  .hero {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 60px 24px 40px;
  }

  .hero-tag {
    display: inline-block;
    padding: 4px 14px;
    border: 1px solid rgba(120,80,255,0.4);
    border-radius: 50px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 20px;
    background: rgba(120,80,255,0.08);
  }

  .hero h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(32px, 8vw, 52px);
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -1.5px;
    margin-bottom: 16px;
  }

  .hero h1 .line2 {
    background: linear-gradient(90deg, var(--accent) 0%, var(--accent2) 50%, var(--accent3) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero p {
    color: var(--muted);
    font-size: 15px;
    max-width: 320px;
    margin: 0 auto 32px;
    line-height: 1.6;
  }

  /* ── SEARCH ── */
  .search-wrap {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto 32px;
    padding: 0 24px;
  }

  .search-box {
    width: 100%;
    padding: 14px 50px 14px 18px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 16px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    outline: none;
    transition: all 0.3s;
    backdrop-filter: blur(10px);
  }

  .search-box::placeholder { color: var(--muted); }

  .search-box:focus {
    border-color: rgba(120,80,255,0.5);
    background: rgba(255,255,255,0.07);
    box-shadow: 0 0 0 3px rgba(120,80,255,0.1), 0 0 30px rgba(120,80,255,0.1);
  }

  .search-icon {
    position: absolute;
    right: 38px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    transition: color 0.2s;
  }

  .search-icon:hover { color: var(--accent); }

  /* ── FILTERS ── */
  .filters {
    position: relative;
    z-index: 1;
    display: flex;
    gap: 8px;
    padding: 0 24px;
    overflow-x: auto;
    scrollbar-width: none;
    margin-bottom: 32px;
  }

  .filters::-webkit-scrollbar { display: none; }

  .filter-chip {
    flex-shrink: 0;
    padding: 7px 16px;
    border-radius: 50px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    backdrop-filter: blur(8px);
  }

  .filter-chip:hover {
    border-color: rgba(120,80,255,0.4);
    color: var(--text);
    background: rgba(120,80,255,0.1);
  }

  .filter-chip.active {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-color: transparent;
    color: #fff;
    box-shadow: 0 4px 16px rgba(120,80,255,0.35);
  }

  /* ── SECTION HEADER ── */
  .section-header {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    margin-bottom: 20px;
  }

  .section-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  .product-count {
    font-size: 12px;
    color: var(--muted);
  }

  /* ── PRODUCT GRID ── */
  .products-grid {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
    padding: 0 16px;
    margin-bottom: 32px;
  }

  /* ── 3D PRODUCT CARD ── */
  .product-card {
    position: relative;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.25s cubic-bezier(.22,.61,.36,1), box-shadow 0.25s;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    transform-style: preserve-3d;
  }

  .product-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, transparent 50%);
    pointer-events: none;
    z-index: 1;
    border-radius: 20px;
  }

  .product-card:hover {
    transform: translateY(-4px) scale(1.01);
    box-shadow:
      0 20px 60px rgba(0,0,0,0.5),
      0 0 0 1px rgba(120,80,255,0.3),
      0 0 30px rgba(120,80,255,0.1);
  }

  .product-card:active { transform: scale(0.97); }

  .card-img-wrap {
    position: relative;
    width: 100%;
    padding-top: 100%;
    overflow: hidden;
    background: rgba(255,255,255,0.03);
  }

  .card-img-wrap img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.4s ease;
  }

  .product-card:hover .card-img-wrap img { transform: scale(1.07); }

  .card-badge {
    position: absolute;
    top: 10px;
    left: 10px;
    padding: 3px 9px;
    border-radius: 50px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    z-index: 2;
    box-shadow: 0 2px 10px rgba(120,80,255,0.4);
  }

  .card-body {
    padding: 12px;
    position: relative;
    z-index: 2;
  }

  .card-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 500;
    line-height: 1.35;
    margin-bottom: 8px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    color: rgba(240,240,255,0.9);
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
  }

  .card-price {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    font-weight: 700;
    background: linear-gradient(90deg, var(--accent3), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .add-btn {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    box-shadow: 0 4px 12px rgba(120,80,255,0.4);
    flex-shrink: 0;
  }

  .add-btn:hover { transform: scale(1.1); }
  .add-btn:active { transform: scale(0.9); }

  /* ── LOAD MORE ── */
  .load-more-wrap {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 0 24px 40px;
  }

  .load-more-btn {
    padding: 14px 40px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 50px;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    backdrop-filter: blur(8px);
  }

  .load-more-btn:hover {
    background: rgba(120,80,255,0.15);
    border-color: rgba(120,80,255,0.4);
    box-shadow: 0 0 30px rgba(120,80,255,0.15);
  }

  /* ── SKELETON ── */
  .skeleton-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
  }

  .skeleton-img {
    width: 100%;
    padding-top: 100%;
    background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
  }

  .skeleton-line {
    height: 12px;
    border-radius: 6px;
    margin: 12px 12px 8px;
    background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
  }

  .skeleton-line.short { width: 60%; margin-top: 0; }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* ── ERROR STATE ── */
  .error-box {
    background: rgba(255,60,172,0.08);
    border: 1px solid rgba(255,60,172,0.2);
    border-radius: 20px;
    padding: 32px 24px;
    text-align: center;
    margin: 0 16px;
  }

  .error-box .icon { font-size: 32px; margin-bottom: 12px; }
  .error-box p { color: var(--muted); font-size: 14px; margin-bottom: 20px; }

  .retry-btn {
    padding: 10px 28px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none;
    border-radius: 50px;
    color: #fff;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(255,60,172,0.3);
  }

  /* ── CART DRAWER ── */
  .drawer-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .drawer-overlay.open { opacity: 1; pointer-events: all; }

  .cart-drawer {
    position: fixed;
    right: 0;
    top: 0;
    bottom: 0;
    width: min(380px, 100vw);
    background: rgba(8,10,22,0.95);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-left: 1px solid var(--border);
    z-index: 201;
    transform: translateX(100%);
    transition: transform 0.35s cubic-bezier(.22,.61,.36,1);
    display: flex;
    flex-direction: column;
  }

  .cart-drawer.open { transform: translateX(0); }

  .drawer-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
  }

  .drawer-header h2 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 18px;
    font-weight: 600;
  }

  .close-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .close-btn:hover { background: var(--surface-hover); }

  .drawer-items {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .drawer-empty {
    text-align: center;
    color: var(--muted);
    padding: 60px 20px;
  }

  .drawer-empty .icon { font-size: 40px; margin-bottom: 12px; }

  .cart-item {
    display: flex;
    gap: 12px;
    padding: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 10px;
    transition: background 0.2s;
  }

  .cart-item img {
    width: 56px;
    height: 56px;
    border-radius: 10px;
    object-fit: cover;
    flex-shrink: 0;
  }

  .cart-item-info { flex: 1; min-width: 0; }

  .cart-item-name {
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 4px;
  }

  .cart-item-price {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--accent3);
  }

  .cart-item-remove {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    padding: 4px;
    transition: color 0.2s;
    align-self: flex-start;
  }

  .cart-item-remove:hover { color: var(--accent2); }

  .drawer-footer {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
  }

  .cart-total {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }

  .cart-total span:first-child { color: var(--muted); font-size: 14px; }

  .cart-total-amount {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 20px;
    font-weight: 700;
    background: linear-gradient(90deg, var(--accent3), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .checkout-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 14px;
    color: #fff;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 6px 24px rgba(120,80,255,0.4);
    letter-spacing: 0.3px;
  }

  .checkout-btn:hover { transform: translateY(-1px); box-shadow: 0 10px 32px rgba(120,80,255,0.5); }

  .usdt-note {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    margin-top: 10px;
  }

  /* ── FOOTER ── */
  footer {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 24px;
    border-top: 1px solid var(--border);
    color: var(--muted);
    font-size: 12px;
    line-height: 1.8;
  }

  footer a { color: var(--accent); text-decoration: none; }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: rgba(12,14,28,0.95);
    border: 1px solid rgba(120,80,255,0.4);
    border-radius: 50px;
    padding: 12px 24px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    z-index: 300;
    transition: transform 0.3s cubic-bezier(.22,.61,.36,1);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(120,80,255,0.2);
    backdrop-filter: blur(16px);
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- NAVBAR -->
<nav>
  <div class="logo">Tech<span>Drop</span> ⚡</div>
  <button class="cart-btn" onclick="openCart()">
    🛒 Cart <span class="cart-count" id="cartCount">0</span>
  </button>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-tag">Free worldwide shipping</div>
  <h1>Next-Gen<br><span class="line2">Electronics</span></h1>
  <p>Top-rated gadgets shipped to your door. Pay securely with USDT.</p>
</section>

<!-- SEARCH -->
<div class="search-wrap">
  <input class="search-box" id="searchInput" type="text" placeholder="Search electronics..." />
  <span class="search-icon" onclick="doSearch()">🔍</span>
</div>

<!-- FILTERS -->
<div class="filters" id="filters">
  <button class="filter-chip active" data-kw="">All</button>
  <button class="filter-chip" data-kw="bluetooth speaker">Bluetooth</button>
  <button class="filter-chip" data-kw="wireless earbuds">Earbuds</button>
  <button class="filter-chip" data-kw="gaming">Gaming</button>
  <button class="filter-chip" data-kw="smart watch">Smartwatch</button>
  <button class="filter-chip" data-kw="phone case">Phone Accessories</button>
  <button class="filter-chip" data-kw="camera">Cameras</button>
</div>

<!-- PRODUCTS -->
<div class="section-header">
  <span class="section-title">Products</span>
  <span class="product-count" id="productCount"></span>
</div>

<div class="products-grid" id="productsGrid"></div>

<div class="load-more-wrap" id="loadMoreWrap" style="display:none">
  <button class="load-more-btn" onclick="loadMore()">Load more</button>
</div>

<!-- FOOTER -->
<footer>
  © 2026 TechDrop · Secure USDT TRC20 Payments · Worldwide Shipping<br>
  Powered by <a href="https://cjdropshipping.com" target="_blank">CJ Dropshipping</a>
</footer>

<!-- CART DRAWER -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeCart()"></div>
<div class="cart-drawer" id="cartDrawer">
  <div class="drawer-header">
    <h2>Your Cart</h2>
    <button class="close-btn" onclick="closeCart()">✕</button>
  </div>
  <div class="drawer-items" id="drawerItems"></div>
  <div class="drawer-footer" id="drawerFooter" style="display:none">
    <div class="cart-total">
      <span>Total</span>
      <span class="cart-total-amount" id="cartTotal">$0.00</span>
    </div>
    <button class="checkout-btn" onclick="checkout()">Checkout with USDT →</button>
    <p class="usdt-note">🔒 Payment via USDT TRC20 · Secure · Borderless</p>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  // ── STATE ──
  let cart = JSON.parse(localStorage.getItem('td_cart') || '[]');
  let currentPage = 1;
  let currentKeyword = '';
  let totalProducts = 0;
  let loading = false;

  // ── INIT ──
  document.addEventListener('DOMContentLoaded', () => {
    updateCartUI();
    loadProducts(true);
    setupFilters();
    setupSearch();
  });

  // ── FETCH PRODUCTS ──
  async function loadProducts(reset = false) {
    if (loading) return;
    loading = true;

    if (reset) {
      currentPage = 1;
      document.getElementById('productsGrid').innerHTML = skeletons(6);
      document.getElementById('loadMoreWrap').style.display = 'none';
      document.getElementById('productCount').textContent = '';
    }

    try {
      const params = new URLSearchParams({
        pageNum: currentPage,
        pageSize: 20,
        orderBy: 1,
      });
      if (currentKeyword) params.set('keyword', currentKeyword);

      const res = await fetch(`/api/products?${params}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      if (!data.success) throw new Error(data.error || 'API error');

      totalProducts = data.total || 0;
      const products = data.products || [];

      if (reset) {
        document.getElementById('productsGrid').innerHTML = '';
      }

      if (products.length === 0 && reset) {
        document.getElementById('productsGrid').innerHTML = `
          <div class="error-box" style="grid-column:1/-1">
            <div class="icon">🔍</div>
            <p>No products found for "${currentKeyword}"</p>
          </div>`;
      } else {
        products.forEach(p => {
          document.getElementById('productsGrid').insertAdjacentHTML('beforeend', productCard(p));
        });
        document.getElementById('productCount').textContent =
          `${totalProducts.toLocaleString()} items`;
      }

      const loaded = currentPage * 20;
      if (loaded < totalProducts && products.length === 20) {
        document.getElementById('loadMoreWrap').style.display = 'block';
      } else {
        document.getElementById('loadMoreWrap').style.display = 'none';
      }

    } catch (err) {
      console.error(err);
      if (reset) {
        document.getElementById('productsGrid').innerHTML = `
          <div class="error-box" style="grid-column:1/-1">
            <div class="icon">⚠️</div>
            <p>Could not load products. Check your connection or API setup.</p>
            <button class="retry-btn" onclick="loadProducts(true)">Retry</button>
          </div>`;
      }
    } finally {
      loading = false;
    }
  }

  function loadMore() {
    currentPage++;
    loadProducts(false);
  }

  // ── CARD HTML ──
  function productCard(p) {
    const price = p.price ? `$${parseFloat(p.price).toFixed(2)}` : 'See price';
    const safe = (s) => (s || '').replace(/"/g, '&quot;');
    return `
      <div class="product-card" onclick='openProduct(${JSON.stringify(p)})'>
        <div class="card-badge">IN STOCK</div>
        <div class="card-img-wrap">
          <img src="${safe(p.image)}" alt="${safe(p.name)}" loading="lazy"
               onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22><rect fill=%22%230c0e1c%22 width=%22200%22 height=%22200%22/><text x=%2250%%22 y=%2250%%22 fill=%22%23555%22 text-anchor=%22middle%22 dy=%22.3em%22 font-size=%2240%22>📦</text></svg>'"/>
        </div>
        <div class="card-body">
          <div class="card-name">${safe(p.name)}</div>
          <div class="card-footer">
            <div class="card-price">${price}</div>
            <button class="add-btn" onclick="event.stopPropagation(); addToCart(${JSON.stringify(p)})">+</button>
          </div>
        </div>
      </div>`;
  }

  function skeletons(n) {
    return Array(n).fill(`
      <div class="skeleton-card">
        <div class="skeleton-img"></div>
        <div class="skeleton-line"></div>
        <div class="skeleton-line short"></div>
      </div>`).join('');
  }

  // ── FILTERS ──
  function setupFilters() {
    document.querySelectorAll('.filter-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        currentKeyword = chip.dataset.kw;
        document.getElementById('searchInput').value = currentKeyword;
        loadProducts(true);
      });
    });
  }

  // ── SEARCH ──
  function setupSearch() {
    const input = document.getElementById('searchInput');
    let timer;
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') doSearch();
    });
    input.addEventListener('input', () => {
      clearTimeout(timer);
      timer = setTimeout(doSearch, 600);
    });
  }

  function doSearch() {
    const val = document.getElementById('searchInput').value.trim();
    currentKeyword = val;
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    if (!val) document.querySelector('.filter-chip').classList.add('active');
    loadProducts(true);
  }

  // ── CART ──
  function addToCart(product) {
    const existing = cart.find(i => i.id === product.id);
    if (existing) {
      existing.qty = (existing.qty || 1) + 1;
    } else {
      cart.push({ ...product, qty: 1 });
    }
    saveCart();
    updateCartUI();
    showToast(`✓ Added to cart`);
  }

  function removeFromCart(id) {
    cart = cart.filter(i => i.id !== id);
    saveCart();
    updateCartUI();
    renderDrawer();
  }

  function saveCart() {
    localStorage.setItem('td_cart', JSON.stringify(cart));
  }

  function updateCartUI() {
    const total = cart.reduce((s, i) => s + (i.qty || 1), 0);
    document.getElementById('cartCount').textContent = total;
  }

  function openCart() {
    renderDrawer();
    document.getElementById('drawerOverlay').classList.add('open');
    document.getElementById('cartDrawer').classList.add('open');
  }

  function closeCart() {
    document.getElementById('drawerOverlay').classList.remove('open');
    document.getElementById('cartDrawer').classList.remove('open');
  }

  function renderDrawer() {
    const items = document.getElementById('drawerItems');
    const footer = document.getElementById('drawerFooter');

    if (cart.length === 0) {
      items.innerHTML = `<div class="drawer-empty"><div class="icon">🛒</div><p>Your cart is empty</p></div>`;
      footer.style.display = 'none';
      return;
    }

    items.innerHTML = cart.map(item => {
      const price = item.price ? parseFloat(item.price) : 0;
      return `
        <div class="cart-item">
          <img src="${item.image || ''}" alt="${item.name || ''}"
               onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2256%22 height=%2256%22><rect fill=%22%230c0e1c%22 width=%2256%22 height=%2256%22/><text x=%2250%%22 y=%2250%%22 fill=%22%23555%22 text-anchor=%22middle%22 dy=%22.3em%22 font-size=%2224%22>📦</text></svg>'"/>
          <div class="cart-item-info">
            <div class="cart-item-name">${item.name || 'Product'}</div>
            <div class="cart-item-price">$${(price * (item.qty || 1)).toFixed(2)} × ${item.qty || 1}</div>
          </div>
          <button class="cart-item-remove" onclick="removeFromCart('${item.id}')">✕</button>
        </div>`;
    }).join('');

    const total = cart.reduce((s, i) => {
      const p = i.price ? parseFloat(i.price) : 0;
      return s + p * (i.qty || 1);
    }, 0);

    document.getElementById('cartTotal').textContent = `$${total.toFixed(2)}`;
    footer.style.display = 'block';
  }

  function checkout() {
    if (cart.length === 0) return;
    showToast('Redirecting to checkout...');
    setTimeout(() => {
      window.location.href = '/checkout';
    }, 800);
  }

  // ── PRODUCT DETAIL (placeholder) ──
  function openProduct(p) {
    // You can expand this into a full modal later
    showToast(`Viewing: ${p.name.slice(0, 30)}...`);
  }

  // ── TOAST ──
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }
</script>
</body>
</html>
