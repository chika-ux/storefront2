<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TechDrop — Premium Electronics</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#F8FAFC;color:#1E293B}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:4px}
.cart-drawer{position:fixed;right:0;top:0;height:100vh;width:360px;background:#fff;box-shadow:-4px 0 24px rgba(0,0,0,.12);z-index:1000;transform:translateX(100%);transition:transform .3s ease;display:flex;flex-direction:column}
.cart-drawer.open{transform:translateX(0)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:999;opacity:0;pointer-events:none;transition:opacity .3s}
.overlay.open{opacity:1;pointer-events:all}
.product-card:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,.12)}
.product-card{transition:all .2s ease}
.badge{animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
@media(max-width:600px){.cart-drawer{width:100vw}.grid-3{grid-template-columns:1fr 1fr!important}.hero-btns{flex-direction:column}.nav-links{display:none!important}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

const PRODUCTS=[
  {id:1,name:"AirPods Pro Max",price:89.99,original:149.99,rating:4.8,reviews:2341,emoji:"🎧",category:"Audio",badge:"Best Seller",desc:"Active noise cancellation, 30hr battery, premium sound",colors:["#1E293B","#F1F5F9","#7C3AED"]},
  {id:2,name:"Smart Watch Ultra",price:129.99,original:199.99,rating:4.7,reviews:1892,emoji:"⌚",category:"Wearables",badge:"Hot",desc:"Heart rate, GPS, 7-day battery, waterproof IP68",colors:["#1E293B","#DC2626","#0EA5E9"]},
  {id:3,name:"Wireless Charger Pad",price:24.99,original:39.99,rating:4.6,reviews:4521,emoji:"🔋",category:"Accessories",badge:"Sale",desc:"15W fast charging, compatible with all Qi devices",colors:["#1E293B","#F8FAFC"]},
  {id:4,name:"Mechanical Keyboard",price:79.99,original:119.99,rating:4.9,reviews:987,emoji:"⌨️",category:"Computing",badge:"Top Rated",desc:"RGB backlight, tactile switches, compact TKL layout",colors:["#1E293B","#F8FAFC","#4F46E5"]},
  {id:5,name:"4K Mini Projector",price:149.99,original:249.99,rating:4.5,reviews:763,emoji:"📽️",category:"Entertainment",badge:"New",desc:"4K resolution, 200\" screen, built-in speakers & WiFi",colors:["#1E293B","#F8FAFC"]},
  {id:6,name:"USB-C Hub Pro",price:39.99,original:59.99,rating:4.7,reviews:3102,emoji:"🔌",category:"Accessories",badge:"Sale",desc:"7-in-1 hub: HDMI 4K, USB 3.0 x3, SD card, PD 100W",colors:["#94A3B8","#1E293B"]},
  {id:7,name:"Portable SSD 1TB",price:69.99,original:99.99,rating:4.8,reviews:2210,emoji:"💾",category:"Storage",badge:"Deal",desc:"1000MB/s read speed, shock-proof, pocket-sized",colors:["#1E293B","#0EA5E9","#10B981"]},
  {id:8,name:"Ring Light Kit",price:34.99,original:54.99,rating:4.6,reviews:5431,emoji:"💡",category:"Photography",badge:"Popular",desc:"18\" ring light, tripod stand, phone holder included",colors:["#F8FAFC","#1E293B"]},
  {id:9,name:"Gaming Mouse Pro",price:49.99,original:79.99,rating:4.9,reviews:1654,emoji:"🖱️",category:"Gaming",badge:"Top Rated",desc:"25K DPI sensor, 11 programmable buttons, RGB",colors:["#1E293B","#F8FAFC","#DC2626"]},
];

const CATS=["All","Audio","Wearables","Accessories","Computing","Entertainment","Storage","Photography","Gaming"];

const badgeColor={
  "Best Seller":"#10B981","Hot":"#EF4444","Sale":"#F59E0B","Top Rated":"#8B5CF6",
  "New":"#0EA5E9","Deal":"#EC4899","Popular":"#F97316"
};

function Stars({rating}){
  return <span style={{color:"#F59E0B",fontSize:12}}>{"★".repeat(Math.floor(rating))}{"☆".repeat(5-Math.floor(rating))} <span style={{color:"#94A3B8"}}>{rating}</span></span>;
}

function App(){
  const [cart,setCart]=useState([]);
  const [cartOpen,setCartOpen]=useState(false);
  const [page,setPage]=useState("shop");
  const [search,setSearch]=useState("");
  const [cat,setCat]=useState("All");
  const [checkoutDone,setCheckoutDone]=useState(false);
  const [form,setForm]=useState({name:"",email:"",address:"",phone:""});
  const [notify,setNotify]=useState(null);

  const addToCart=(p)=>{
    setCart(c=>{
      const ex=c.find(x=>x.id===p.id);
      if(ex)return c.map(x=>x.id===p.id?{...x,qty:x.qty+1}:x);
      return [...c,{...p,qty:1}];
    });
    showNotify(`${p.name} added to cart!`);
  };

  const removeFromCart=(id)=>setCart(c=>c.filter(x=>x.id!==id));
  const updateQty=(id,qty)=>{
    if(qty<1){removeFromCart(id);return;}
    setCart(c=>c.map(x=>x.id===id?{...x,qty}:x));
  };

  const showNotify=(msg)=>{
    setNotify(msg);
    setTimeout(()=>setNotify(null),2500);
  };

  const total=cart.reduce((s,x)=>s+x.price*x.qty,0);
  const count=cart.reduce((s,x)=>s+x.qty,0);

  const filtered=PRODUCTS.filter(p=>{
    const matchCat=cat==="All"||p.category===cat;
    const matchSearch=p.name.toLowerCase().includes(search.toLowerCase())||p.desc.toLowerCase().includes(search.toLowerCase());
    return matchCat&&matchSearch;
  });

  const doCheckout=()=>{
    if(!form.name||!form.email){showNotify("Please fill in name and email!");return;}
    setCheckoutDone(true);
    setCart([]);
    setCartOpen(false);
  };

  return(
    <div style={{minHeight:"100vh"}}>
      {/* NOTIFICATION */}
      {notify&&<div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",background:"#10B981",color:"#fff",padding:"10px 20px",borderRadius:10,zIndex:2000,fontWeight:600,fontSize:14,boxShadow:"0 4px 20px rgba(0,0,0,.2)",whiteSpace:"nowrap"}}>✓ {notify}</div>}

      {/* CART OVERLAY */}
      <div className={`overlay ${cartOpen?"open":""}`} onClick={()=>setCartOpen(false)}/>

      {/* CART DRAWER */}
      <div className={`cart-drawer ${cartOpen?"open":""}`}>
        <div style={{padding:"18px 20px",borderBottom:"1px solid #E2E8F0",display:"flex",justifyContent:"space-between",alignItems:"center",background:"#F8FAFC"}}>
          <h2 style={{fontSize:16,fontWeight:700}}>🛒 Cart ({count})</h2>
          <button onClick={()=>setCartOpen(false)} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#64748B"}}>✕</button>
        </div>

        <div style={{flex:1,overflowY:"auto",padding:"16px 20px"}}>
          {cart.length===0?(
            <div style={{textAlign:"center",padding:"60px 0",color:"#94A3B8"}}>
              <div style={{fontSize:48,marginBottom:12}}>🛒</div>
              <p style={{fontWeight:600}}>Your cart is empty</p>
              <p style={{fontSize:13,marginTop:6}}>Add some electronics!</p>
            </div>
          ):cart.map(item=>(
            <div key={item.id} style={{display:"flex",gap:12,marginBottom:16,padding:"12px",background:"#F8FAFC",borderRadius:12,border:"1px solid #E2E8F0"}}>
              <div style={{fontSize:32,width:50,height:50,display:"flex",alignItems:"center",justifyContent:"center",background:"#fff",borderRadius:10,flexShrink:0}}>{item.emoji}</div>
              <div style={{flex:1}}>
                <p style={{fontSize:13,fontWeight:700,color:"#1E293B",marginBottom:2}}>{item.name}</p>
                <p style={{fontSize:13,color:"#4F46E5",fontWeight:700}}>${item.price}</p>
                <div style={{display:"flex",alignItems:"center",gap:8,marginTop:6}}>
                  <button onClick={()=>updateQty(item.id,item.qty-1)} style={{width:24,height:24,borderRadius:6,border:"1px solid #E2E8F0",background:"#fff",cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>−</button>
                  <span style={{fontSize:13,fontWeight:600,minWidth:20,textAlign:"center"}}>{item.qty}</span>
                  <button onClick={()=>updateQty(item.id,item.qty+1)} style={{width:24,height:24,borderRadius:6,border:"1px solid #E2E8F0",background:"#fff",cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>+</button>
                  <button onClick={()=>removeFromCart(item.id)} style={{marginLeft:"auto",background:"#FEE2E2",border:"none",color:"#EF4444",borderRadius:6,padding:"2px 8px",cursor:"pointer",fontSize:11,fontWeight:600}}>Remove</button>
                </div>
              </div>
            </div>
          ))}
        </div>

        {cart.length>0&&(
          <div style={{padding:"16px 20px",borderTop:"1px solid #E2E8F0",background:"#F8FAFC"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
              <span style={{fontSize:13,color:"#64748B"}}>Subtotal</span>
              <span style={{fontSize:13,fontWeight:600}}>${total.toFixed(2)}</span>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
              <span style={{fontSize:13,color:"#64748B"}}>Shipping</span>
              <span style={{fontSize:13,fontWeight:600,color:"#10B981"}}>FREE</span>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:16,paddingTop:10,borderTop:"1px solid #E2E8F0"}}>
              <span style={{fontSize:15,fontWeight:700}}>Total</span>
              <span style={{fontSize:15,fontWeight:800,color:"#4F46E5"}}>${total.toFixed(2)}</span>
            </div>

            {/* Checkout form */}
            <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:12}}>
              {[["name","👤 Full Name","John Doe"],["email","📧 Email","john@email.com"],["phone","📱 Phone","555-0100"],["address","📍 Address","123 Main St"]].map(([k,label,ph])=>(
                <input key={k} placeholder={label+" — "+ph} value={form[k]} onChange={e=>setForm(f=>({...f,[k]:e.target.value}))}
                  style={{border:"1px solid #E2E8F0",borderRadius:9,padding:"9px 12px",fontSize:13,outline:"none",fontFamily:"inherit",background:"#fff"}}/>
              ))}
            </div>

            <button onClick={doCheckout}
              style={{width:"100%",background:"linear-gradient(135deg,#4F46E5,#7C3AED)",color:"#fff",border:"none",borderRadius:10,padding:"13px",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
              🔒 Place Order — ${total.toFixed(2)}
            </button>
            <p style={{fontSize:11,color:"#94A3B8",textAlign:"center",marginTop:8}}>Secure checkout · Free shipping · 30-day returns</p>
          </div>
        )}
      </div>

      {/* ORDER SUCCESS */}
      {checkoutDone&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",zIndex:3000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:"#fff",borderRadius:20,padding:"40px 30px",maxWidth:380,width:"100%",textAlign:"center"}}>
            <div style={{fontSize:64,marginBottom:16}}>🎉</div>
            <h2 style={{fontSize:22,fontWeight:800,color:"#1E293B",marginBottom:8}}>Order Placed!</h2>
            <p style={{fontSize:14,color:"#64748B",marginBottom:24}}>Thank you {form.name}! Your order has been confirmed. We'll email {form.email} with tracking info.</p>
            <button onClick={()=>setCheckoutDone(false)} style={{background:"#4F46E5",color:"#fff",border:"none",borderRadius:10,padding:"12px 28px",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Continue Shopping</button>
          </div>
        </div>
      )}

      {/* NAV */}
      <nav style={{background:"#fff",borderBottom:"1px solid #E2E8F0",position:"sticky",top:0,zIndex:100,padding:"0 5%"}}>
        <div style={{maxWidth:1200,margin:"0 auto",display:"flex",alignItems:"center",height:60,gap:20}}>
          <div style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer"}} onClick={()=>setPage("shop")}>
            <div style={{width:32,height:32,borderRadius:8,background:"linear-gradient(135deg,#4F46E5,#7C3AED)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>⚡</div>
            <span style={{fontWeight:800,fontSize:17,color:"#1E293B"}}>TechDrop</span>
          </div>

          <div style={{flex:1,maxWidth:400,margin:"0 auto"}}>
            <div style={{position:"relative"}}>
              <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:"#94A3B8",fontSize:14}}>🔍</span>
              <input placeholder="Search electronics…" value={search} onChange={e=>setSearch(e.target.value)}
                style={{width:"100%",border:"1px solid #E2E8F0",borderRadius:10,padding:"8px 12px 8px 34px",fontSize:13,outline:"none",fontFamily:"inherit",background:"#F8FAFC"}}/>
            </div>
          </div>

          <div className="nav-links" style={{display:"flex",gap:20}}>
            {["Shop","Deals","About"].map(l=>(
              <span key={l} style={{fontSize:14,color:"#64748B",cursor:"pointer",fontWeight:500}}>{l}</span>
            ))}
          </div>

          <button onClick={()=>setCartOpen(true)} style={{position:"relative",background:"#4F46E5",color:"#fff",border:"none",borderRadius:10,padding:"8px 16px",fontSize:14,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:6,fontFamily:"inherit"}}>
            🛒 Cart
            {count>0&&<span style={{background:"#EF4444",color:"#fff",borderRadius:"50%",width:18,height:18,fontSize:11,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>{count}</span>}
          </button>
        </div>
      </nav>

      {/* HERO */}
      <section style={{background:"linear-gradient(135deg,#0A0F1E 0%,#1E1B4B 100%)",padding:"60px 5%",textAlign:"center"}}>
        <div style={{maxWidth:700,margin:"0 auto"}}>
          <div style={{display:"inline-flex",alignItems:"center",gap:6,background:"rgba(99,102,241,.2)",border:"1px solid rgba(99,102,241,.4)",borderRadius:20,padding:"4px 14px",marginBottom:20}}>
            <span className="badge" style={{width:7,height:7,borderRadius:"50%",background:"#818CF8",display:"inline-block"}}/>
            <span style={{fontSize:12,color:"#818CF8",fontWeight:600}}>Free shipping on all orders today only</span>
          </div>
          <h1 style={{fontSize:"clamp(30px,6vw,56px)",fontWeight:800,color:"#fff",lineHeight:1.15,marginBottom:16,letterSpacing:"-.02em"}}>
            Premium Electronics<br/>
            <span style={{background:"linear-gradient(90deg,#818CF8,#38BDF8)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>At Unbeatable Prices</span>
          </h1>
          <p style={{fontSize:16,color:"rgba(255,255,255,.6)",marginBottom:28}}>Gadgets, accessories & more — shipped fast, hassle-free returns.</p>
          <div className="hero-btns" style={{display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap"}}>
            <button onClick={()=>document.getElementById("products").scrollIntoView({behavior:"smooth"})}
              style={{background:"linear-gradient(135deg,#4F46E5,#7C3AED)",color:"#fff",border:"none",borderRadius:10,padding:"13px 26px",fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
              Shop Now 🛒
            </button>
            <button style={{background:"rgba(255,255,255,.1)",color:"#fff",border:"1px solid rgba(255,255,255,.2)",borderRadius:10,padding:"13px 26px",fontSize:15,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
              View Deals 🔥
            </button>
          </div>
          <div style={{display:"flex",gap:24,justifyContent:"center",marginTop:28,flexWrap:"wrap"}}>
            {[["📦","Free Shipping"],["🔒","Secure Pay"],["↩️","30-Day Returns"],["⭐","50k+ Reviews"]].map(([i,l])=>(
              <div key={l} style={{display:"flex",alignItems:"center",gap:6,color:"rgba(255,255,255,.5)",fontSize:13}}>
                <span>{i}</span><span>{l}</span>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* CATEGORIES */}
      <section style={{padding:"20px 5%",background:"#fff",borderBottom:"1px solid #E2E8F0",overflowX:"auto"}}>
        <div style={{display:"flex",gap:8,maxWidth:1200,margin:"0 auto",flexWrap:"wrap"}}>
          {CATS.map(c=>(
            <button key={c} onClick={()=>setCat(c)}
              style={{padding:"7px 16px",borderRadius:20,border:`1.5px solid ${cat===c?"#4F46E5":"#E2E8F0"}`,background:cat===c?"#4F46E5":"#fff",color:cat===c?"#fff":"#64748B",fontSize:13,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap",fontFamily:"inherit",transition:"all .15s"}}>
              {c}
            </button>
          ))}
        </div>
      </section>

      {/* PRODUCTS */}
      <section id="products" style={{padding:"32px 5%",maxWidth:1200,margin:"0 auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <h2 style={{fontSize:18,fontWeight:700,color:"#1E293B"}}>{cat==="All"?"All Products":cat} <span style={{color:"#94A3B8",fontWeight:400,fontSize:14}}>({filtered.length})</span></h2>
          <span style={{fontSize:13,color:"#94A3B8"}}>Free shipping on everything</span>
        </div>
        <div className="grid-3" style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:18}}>
          {filtered.map(p=>(
            <div key={p.id} className="product-card" style={{background:"#fff",borderRadius:16,border:"1px solid #E2E8F0",overflow:"hidden"}}>
              <div style={{background:"linear-gradient(135deg,#F1F5F9,#E2E8F0)",padding:"30px 20px",textAlign:"center",position:"relative"}}>
                <span style={{fontSize:64}}>{p.emoji}</span>
                {p.badge&&<span style={{position:"absolute",top:12,left:12,background:badgeColor[p.badge]||"#4F46E5",color:"#fff",fontSize:10,fontWeight:700,padding:"3px 8px",borderRadius:6}}>{p.badge}</span>}
                <span style={{position:"absolute",top:12,right:12,background:"#FEF3C7",color:"#92400E",fontSize:10,fontWeight:700,padding:"3px 8px",borderRadius:6}}>
                  -{Math.round((1-p.price/p.original)*100)}%
                </span>
              </div>
              <div style={{padding:"16px"}}>
                <p style={{fontSize:11,color:"#94A3B8",fontWeight:600,marginBottom:4,textTransform:"uppercase",letterSpacing:".04em"}}>{p.category}</p>
                <h3 style={{fontSize:15,fontWeight:700,color:"#1E293B",marginBottom:6}}>{p.name}</h3>
                <p style={{fontSize:12,color:"#64748B",marginBottom:8,lineHeight:1.5}}>{p.desc}</p>
                <Stars rating={p.rating}/>
                <p style={{fontSize:11,color:"#94A3B8",marginBottom:12}}>{p.reviews.toLocaleString()} reviews</p>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <div>
                    <span style={{fontSize:20,fontWeight:800,color:"#4F46E5"}}>${p.price}</span>
                    <span style={{fontSize:12,color:"#94A3B8",textDecoration:"line-through",marginLeft:6}}>${p.original}</span>
                  </div>
                </div>
                <button onClick={()=>addToCart(p)}
                  style={{width:"100%",marginTop:12,background:"linear-gradient(135deg,#4F46E5,#7C3AED)",color:"#fff",border:"none",borderRadius:10,padding:"10px",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
                  Add to Cart 🛒
                </button>
              </div>
            </div>
          ))}
        </div>

        {filtered.length===0&&(
          <div style={{textAlign:"center",padding:"60px 0",color:"#94A3B8"}}>
            <div style={{fontSize:48,marginBottom:12}}>🔍</div>
            <p style={{fontWeight:600,fontSize:16}}>No products found</p>
            <p style={{fontSize:14,marginTop:6}}>Try a different search or category</p>
          </div>
        )}
      </section>

      {/* FOOTER */}
      <footer style={{background:"#0A0F1E",padding:"40px 5% 24px",marginTop:40}}>
        <div style={{maxWidth:1200,margin:"0 auto"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
            <div style={{width:28,height:28,borderRadius:7,background:"linear-gradient(135deg,#4F46E5,#7C3AED)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>⚡</div>
            <span style={{color:"#fff",fontWeight:800,fontSize:16}}>TechDrop</span>
          </div>
          <p style={{fontSize:13,color:"rgba(255,255,255,.35)",marginBottom:20}}>Premium electronics at unbeatable prices. Fast shipping worldwide.</p>
          <div style={{display:"flex",gap:20,flexWrap:"wrap",marginBottom:24}}>
            {["Free Shipping","Secure Payments","30-Day Returns","24/7 Support"].map(f=>(
              <span key={f} style={{fontSize:12,color:"rgba(255,255,255,.4)"}}>✓ {f}</span>
            ))}
          </div>
          <div style={{borderTop:"1px solid rgba(255,255,255,.07)",paddingTop:20,display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
            <span style={{fontSize:12,color:"rgba(255,255,255,.25)"}}>© 2026 TechDrop. All rights reserved.</span>
            <span style={{fontSize:12,color:"rgba(255,255,255,.25)"}}>Built with ⚡</span>
          </div>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
